[advisories]
ignore = [
    # Coming from outdated libp2p and litep2p dependencies from which
    # some Polkadot libraries are dependent on. They will be updated
    # once we update Polkadot packages to latest version
    "RUSTSEC-2024-0421",
    "RUSTSEC-2025-0009",
    # The next two coming from outdated wasmtime dependency from wich polkadot
    # and substrate crates are dependent on. Unfortunally seams that also the
    # newver versions still depend from the same wasmtime version.
    "RUSTSEC-2023-0091", # LOW severity
    "RUSTSEC-2024-0438", # Just affect Windows where devices are not fully sandboxed.
    "RUSTSEC-2024-0442", # FROM THE VUNERABILITY DESCRIPTION
    # Note: this is an internal-only crate in the Wasmtime project not intended for external
    # use and is more strongly signaled nowadays as of bytecodealliance/wasmtime#10963.
    # Please open an issue in Wasmtime if you're using this crate directly.
    # ** We don't use this crate directly, so we can ignore it. **
    "RUSTSEC-2025-0055", # coming from indirect dependency tracing-subscriber v0.2
    # on the other end the v0.3.20 break console log output formatting
    # how reported in https://github.com/tokio-rs/tracing/issues/3369
    "RUSTSEC-2025-0118", # coming from indirect dependency wasmtime v0.8.1.
    # From https://rustsec.org/advisories/RUSTSEC-2025-0118 ->
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-hc7m-r6v8-hg9q
    # "This is a bug in Wasmtime's safe Rust API. It should not be possible to cause unsoundness
    # with Wasmtime's embedding API if unsafe is not used. Embeddings which do not use the wasm
    # threads proposal nor created shared memories nor actually share shared memories across
    # threads are unaffected. Only if shared memories are created across threads might an
    # embedding be affected."
    # We fall in the case where we don't use wasm threads at all.
    "RUSTSEC-2026-0002", # coming from indirect dependency in smoldot-light and libp2p-identif@0.43.1.
    # the first is just used in parazkvtest so we can ignore it.
    # For the second one, we looked into the code at https://github.com/libp2p/rust-libp2p.git@libp2p-identify-v0.43.1
    # and in protocols/identify/src/behaviour.rs we can see that there isn't any mutable iterator used for
    # `lru::LruCache`: so the unsound code is never exercised.
    "RUSTSEC-2026-0020", # wasmtime v8.0.1 via sc-executor-wasmtime (polkadot-sdk, cannot upgrade independently).
    # https://rustsec.org/advisories/RUSTSEC-2026-0020 ->
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-852m-cvvp-9p4w
    # "Wasmtime's implementations of WASIp1 and WASIp2 are affected by this vulnerability."
    # We use wasmtime exclusively as a Wasm executor for Substrate PVF/runtime blobs via
    # sc-executor-wasmtime. Neither wasmtime-wasi nor any WASI context is present in our
    # dependency tree, so we are unaffected.
    "RUSTSEC-2026-0021", # wasmtime v8.0.1 via sc-executor-wasmtime (polkadot-sdk, cannot upgrade independently).
    # https://rustsec.org/advisories/RUSTSEC-2026-0021 ->
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-243v-98vx-264h
    # "Specific to implementations using the wasi:http/types.fields resource in wasmtime-wasi-http."
    # We do not use wasmtime-wasi-http (not present in Cargo.lock) — wasmtime is used only for
    # Substrate PVF/runtime Wasm execution, so we are unaffected.
    "RUSTSEC-2026-0037", # quinn-proto v0.10.6 — stale lockfile entry (libp2p-quic -> quinn -> quinn-proto 0.10).
    # https://rustsec.org/advisories/RUSTSEC-2026-0037
    # Nothing in the workspace actually depends on this chain (`cargo tree` confirms it).
    # It remains in Cargo.lock because Cargo resolves optional dependencies in the lockfile
    # (libp2p's optional `quic` feature pulls it in). Cannot be updated: no patched 0.10.x exists.
    "RUSTSEC-2026-0049", # rustls-webpki v0.101.7 and v0.102.8 — CRL distribution point matching bug.
    # https://rustsec.org/advisories/RUSTSEC-2026-0049 ->
    # https://github.com/rustls/webpki/security/advisories/GHSA-pwjx-qhcg-rvj4
    # The vulnerability only affects TLS CRL-based certificate revocation checking, which is opt-in
    # in rustls (requires explicitly calling `.with_crls()`). We never configure CRL revocation
    # checking — the vulnerable code path is never reached. The v0.103.x instance was updated to
    # v0.103.13; the 0.101.x and 0.102.x versions are transitive deps from polkadot-sdk
    # (libp2p-websocket -> rustls 0.21, jsonrpsee -> rustls 0.22) with no patched versions
    # in those major lines.
    "RUSTSEC-2026-0098", # rustls-webpki v0.101.7 and v0.102.8 — URI name constraints incorrectly accepted.
    # https://rustsec.org/advisories/RUSTSEC-2026-0098 ->
    # https://github.com/advisories/GHSA-965h-392x-2mh5
    # Name constraints for URI names were ignored and therefore accepted. Exploitation requires
    # both a valid certificate signature AND deliberate certificate misissuance by a CA. The
    # v0.103.x instance was updated to v0.103.13; the 0.101.x and 0.102.x versions are transitive
    # deps from polkadot-sdk (libp2p-websocket -> rustls 0.21, jsonrpsee -> rustls 0.22) with no
    # patched versions in those major lines.
    "RUSTSEC-2026-0099", # rustls-webpki v0.101.7 and v0.102.8 — wildcard name constraint bypass.
    # https://rustsec.org/advisories/RUSTSEC-2026-0099 ->
    # https://github.com/advisories/GHSA-xgp8-3hg3-c2mh
    # A name constraint like `accept.example.com` could be bypassed by a wildcard certificate
    # `*.example.com`. Exploitation requires both a valid certificate signature AND deliberate
    # certificate misissuance by a CA. Same transitive dep situation as RUSTSEC-2026-0098 above.
    "RUSTSEC-2026-0104", # rustls-webpki v0.101.7 and v0.102.8 — panic in CRL parsing.
    # https://rustsec.org/advisories/RUSTSEC-2026-0104 ->
    # https://github.com/advisories/GHSA-82j2-j2ch-gfr8
    # Reachable panic when parsing a CRL with an empty BIT STRING in `onlySomeReasons`. This is a
    # DoS vulnerability affecting only applications that actively use CRLs. We never configure CRL
    # revocation checking (no `.with_crls()` calls) — the CRL parsing code is never reached.
    # Same transitive dep situation as RUSTSEC-2026-0049 above.
    #
    # ── April 2026 batch: wasmtime 8.0.1 via sc-executor-wasmtime ──
    # All advisories below affect wasmtime ≥8.0.1, pinned by polkadot-sdk (stable2412)
    # through sc-executor-wasmtime. Cannot be upgraded independently.
    #
    # -- Winch compiler backend (not used) --
    # `wasmtime-winch` is not present in Cargo.lock; Substrate uses Cranelift exclusively.
    "RUSTSEC-2026-0095", # CRITICAL — Winch sandbox-escaping memory access.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-4w5r-mg47-r5m2
    # Winch backend only — we use Cranelift. Unaffected.
    "RUSTSEC-2026-0089", # MEDIUM — Host panic when Winch executes `table.fill`.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-q49f-xg75-m9xw
    # Winch backend only — we use Cranelift. Unaffected.
    "RUSTSEC-2026-0094", # MEDIUM — Improperly masked return value from `table.grow` with Winch.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-f984-pcp8-v2p7
    # Winch backend only — we use Cranelift. Unaffected.
    "RUSTSEC-2026-0086", # LOW — Host data leakage with 64-bit tables and Winch.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-m9w2-8782-2946
    # Winch backend only — we use Cranelift. Unaffected.
    #
    # -- Component model (not used) --
    # Substrate uses core Wasm only; no component-model crates are in Cargo.lock.
    "RUSTSEC-2026-0093", # MEDIUM — Heap OOB read in component model UTF-16 string transcoding.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-394w-hwhg-8vgm
    # Component model only. Unaffected.
    "RUSTSEC-2026-0091", # MEDIUM — OOB write or crash transcoding component model strings.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-394w-hwhg-8vgm
    # Component model only. Unaffected.
    "RUSTSEC-2026-0092", # MEDIUM — Panic transcoding misaligned component model UTF-16 strings.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-jxhv-7h78-9775
    # Component model only. Unaffected.
    "RUSTSEC-2026-0085", # MEDIUM — Panic when lifting `flags` component value.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-m758-wjhj-p3jq
    # Component model only. Unaffected.
    #
    # -- Architecture/config-specific (conditions not met) --
    "RUSTSEC-2026-0096", # CRITICAL — Miscompiled guest heap access on aarch64 Cranelift.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-jhxm-h53p-jm7w
    # Requires ALL of: (1) 64-bit Wasm linear memory (`Config::wasm_memory64` enabled),
    # (2) Spectre mitigations or signals-based traps disabled, (3) aarch64 architecture.
    # Substrate runtimes use 32-bit Wasm linear memories and do not enable `wasm_memory64`,
    # so the miscompiled load pattern is never generated. Unaffected.
    "RUSTSEC-2026-0088", # LOW — Data leakage between pooling allocator instances.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-6wgr-89rj-399p
    # Per the advisory: "Wasmtime is not vulnerable to this issue with its default settings."
    # Requires non-default pooling allocator configuration with `memory_guard_size` = 0 and
    # `memory_reservation` < 4 GiB. Substrate does not use the pooling allocator. Unaffected.
    "RUSTSEC-2026-0087", # MEDIUM — Segfault with `f64x2.splat` on Cranelift x86-64.
    # https://github.com/bytecodealliance/wasmtime/security/advisories/GHSA-qqfj-4vcm-26hv
    # Requires ALL of: (1) x86-64 without SSE3 (SSE3 has been universal since 2004),
    # (2) `signals_based_traps` disabled with guard pages enabled, (3) guest executes
    # `f64x2.splat` SIMD instruction. Substrate runtime Wasm does not use SIMD, and any
    # x86-64 CPU from the last 20 years has SSE3. Unaffected.
    "RUSTSEC-2026-0097", # rand v0.8.5 — unsound aliased &mut via thread_rng() reseeding with custom logger.
    # https://rustsec.org/advisories/RUSTSEC-2026-0097 ->
    # https://github.com/rust-random/rand/pull/1763
    # The vulnerability requires the `log` optional feature to be enabled in rand (so that
    # internal log!() calls compile in and can trigger reentrant thread_rng() access from a
    # custom logger). In our build, `log` is NOT enabled for rand 0.8.5 — confirmed via
    # `cargo tree -p rand@0.8.5 -e features`: only alloc, default, getrandom, libc,
    # rand_chacha, std, std_rng are active. Without `log`, the logging code paths are
    # compiled out and the unsound aliased mutable reference can never be constructed.
    # rand 0.8.5 has no patched 0.8.x release; it is a transitive dep from arkworks
    # (ark-std), polkadot-sdk, plonky2, and sp1, none of which have moved to rand ≥0.9.
    #
    # ── May 2026 batch: hickory-proto via polkadot-sdk networking ──
    #
    "RUSTSEC-2026-0119", # hickory-proto v0.24.4 and v0.25.2 — O(n²) CPU exhaustion in DNS message encoding.
    # https://rustsec.org/advisories/RUSTSEC-2026-0119 ->
    # https://github.com/hickory-dns/hickory-dns/security/advisories/GHSA-q2qq-hmj6-3wpp
    # MODERATE severity DoS via crafted DNS messages with many records triggering quadratic name
    # compression. v0.24.4 comes from libp2p-dns -> hickory-resolver (polkadot-sdk via
    # sc-telemetry -> libp2p 0.54.1). v0.25.2 comes from litep2p -> hickory-resolver
    # (polkadot-sdk via sc-network -> litep2p 0.9.5). Fix is in 0.26.1; no patched 0.24.x or
    # 0.25.x exists, and parent crates are pinned by polkadot-sdk stable2412.
    "RUSTSEC-2026-0118", # hickory-proto v0.25.2 — NSEC3 closest-encloser proof validation unbounded loop.
    # https://rustsec.org/advisories/RUSTSEC-2026-0118 ->
    # https://github.com/hickory-dns/hickory-dns/security/advisories/GHSA-3v94-mw7p-v465
    # HIGH severity DoS affecting DNSSEC validation. Requires `DnssecDnsHandle` with
    # `dnssec-ring` or `dnssec-aws-lc-rs` feature enabled. In our build, hickory-proto 0.25.2
    # has only `futures-io` and `std` features enabled — no DNSSEC features are active
    # (`cargo tree -p hickory-proto@0.25.2 -e features` confirms this). The DNSSEC validation
    # code is not compiled, so the vulnerable code path is unreachable. Unaffected.
]
informational_warnings = ["unmaintained", "yanked"]

[output]
deny = ["unsound"]
quiet = false
show_tree = false
