name: Test

run-name: "Workflow CI/CD Steps: build, unit and integration testing"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: warp-ubuntu-latest-x64-8x
    strategy:
      matrix:
        runtime: [zkverify, volta]
    name: Cargo unit test (${{ matrix.runtime }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # TODO: Needs to be adjusted with something like --all-features --exclude-feature ${{matrix.runtime}}
      - name: Cargo unit test
        uses: ./.github/actions/cmd-in-docker
        with:
          command: "cargo test --lib --bins --all-features --no-fail-fast --release 2>&1 | tee unit_test_output.txt"
          use_cache: 'yes'
          cache_key: 'unit-test-${{ matrix.runtime }}'
          lld_install: 'yes'

      - name: Cargo unit test runtime without features
        uses: ./.github/actions/cmd-in-docker
        with:
          command: "cargo test --lib -p ${{ matrix.runtime }} --no-fail-fast --release 2>&1 | tee -a unit_test_output_${{ matrix.runtime }}.txt"
          use_cache: 'yes'
          cache_key: 'unit-test-no-features-${{ matrix.runtime }}'
          lld_install: 'yes'
          skip_wasm_build: 'yes'

      - name: Upload unit test output
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output-${{ matrix.runtime }}
          path: unit_test_output_${{ matrix.runtime }}.txt
          retention-days: 1
          compression-level: 0
          overwrite: true

  integration-test:
    runs-on: warp-ubuntu-latest-x64-8x
    strategy:
      matrix:
        runtime: [zkverify, volta]
    name: Cargo integration test (${{ matrix.runtime }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cargo integration test
        uses: ./.github/actions/cmd-in-docker
        with:
          # TODO: Needs to be adjusted with something like --all-features --exclude-feature ${{matrix.runtime}}
          command: "cargo test --test '*' --all-features --no-fail-fast --release 2>&1 | tee integration_test_output_${{ matrix.runtime }}.txt"
          use_cache: 'yes'
          cache_key: 'integration-test-${{ matrix.runtime }}'
          lld_install: 'yes'

      - name: Upload integration test output
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-output-${{ matrix.runtime }}
          path: integration_test_output_${{ matrix.runtime }}.txt
          retention-days: 1
          compression-level: 0
          overwrite: true
