name: Try runtime

run-name: "Workflow CI/CD Steps: execute try-runtime"

on:
  workflow_call:
    inputs:
      execute-try-runtime:
        description: 'Whether to execute try-runtime step or not'
        required: false
        type: string
        default: 'yes'
  workflow_dispatch:
    inputs:
      execute-try-runtime:
        description: 'Whether to execute try-runtime step or not'
        required: false
        type: string
        default: 'yes'

jobs:
  try-runtime:
    runs-on: warp-ubuntu-latest-x64-8x
    strategy:
      matrix:
        include:
          # - runtime: zkverify
          #   runtime-name: zkv_runtime
          #   network-uri: wss://zkverify-rpc.zkverify.io/
          - runtime: volta
            runtime-name: volta_runtime
            network-uri: wss://zkverify-volta-rpc.zkverify.io
    name: Try runtime (${{ matrix.runtime }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: runtime build
        uses: ./.github/actions/cmd-in-docker
        with:
          command: "cargo build -p ${{ matrix.runtime }} --release --features try-runtime"
          use_cache: 'yes'
          cache_key: 'build-try-runtime-${{ matrix.runtime }}'
          lld_install: 'yes'

      - name: Execute try-runtime
        if: ${{ inputs.execute-try-runtime == 'yes' }}
        uses: ./.github/actions/cmd-in-docker
        with:
          command: >-
            /bin/bash -c 'curl -sL https://github.com/paritytech/try-runtime-cli/releases/download/v0.8.0/try-runtime-x86_64-unknown-linux-musl -o /build/try-runtime
            && chmod +x /build/try-runtime
            && /build/try-runtime --runtime /build/target/release/wbuild/${{ matrix.runtime-name }}/${{ matrix.runtime-name }}.compact.compressed.wasm on-runtime-upgrade --blocktime 6 --disable-mbm-checks --disable-spec-version-check live --uri ${{ matrix.network-uri }}'
          use_cache: 'no'
