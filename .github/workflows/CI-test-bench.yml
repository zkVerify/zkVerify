run-name: "Workflow CI/CD Step: Build and run benchmarks"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-bench:
    runs-on: warp-ubuntu-latest-x64-8x
    strategy:
      matrix:
        runtime: [zkverify, volta]
    name: Build and run benchmarks (${{ matrix.runtime }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: zkv build with runtime-benchmarks
        uses: ./.github/actions/cmd-in-docker
        with:
          command: "cargo build -p zkv-relay --release --features runtime-benchmarks,${{ matrix.runtime }}"
          use_cache: 'yes'
          cache_key: 'build-runtime-benchmarks-${{ matrix.runtime }}'
          lld_install: 'yes'

      - name: Run benchmarks
        uses: ./.github/actions/cmd-in-docker
        with:
          command: './target/release/zkv-relay benchmark pallet --pallet "*" --extrinsic "*" -s 2 -r 1'
          use_cache: 'no'