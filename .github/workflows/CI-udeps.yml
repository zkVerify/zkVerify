name: Look for unused dependencies

run-name: "Workflow CI/CD Step: cargo udeps"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  udeps:
    runs-on: warp-ubuntu-latest-x64-8x
    strategy:
      matrix:
        include:
          - runtime: zkverify
            exclude: volta
          - runtime: volta
            exclude: zkverify
    name: Udeps (${{ matrix.runtime }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cargo udeps
        uses: ./.github/actions/cmd-in-docker
        with:
          image_tag: "noble_rust-nightly_latest"
          # TODO: Needs to be adjusted with something like --all-features --exclude-feature ${{matrix.runtime}}
          command: "cargo +nightly udeps --all-targets --all-features"
          use_cache: "yes"
          cache_key: "udeps-${{ matrix.runtime }}"
          cargo_binaries_install: "cargo-udeps"
          lld_install: "yes"
          skip_wasm_build: "yes"
